name: Evals Regression Gate

on:
  pull_request:
    paths:
      - 'internal/graph/**'
      - 'internal/adjudicator/**'
      - 'internal/memory/**'
      - 'evals/**'
      - 'pkg/graph/**'
      - 'pkg/adjudicator/**'

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Run Eval Runner
        run: go run cmd/evalrunner/main.go > eval_output.txt

      - name: Check Malicious Recall Threshold
        run: |
          # Read configured threshold (e.g. 0.95)
          # Threshold would be parsed from a config.yml, hardcoded grep for demo
          RECALL=$(grep -oP 'Recall: \K[0-9.]+' eval_output.txt)
          if (( $(echo "$RECALL < 0.95" |bc -l) )); then
            echo "Regression: Golden malicious recall dropped below 0.95 (actual: $RECALL)"
            exit 1
          fi

      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('eval_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Aegis Evals Results\n```\n' + output + '\n```'
            })
