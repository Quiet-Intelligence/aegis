name: Cedar Policy Validation

on:
  pull_request:
    paths:
      - 'internal/policy/cedar/**'

jobs:
  cedar-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cedar CLI
        run: cargo install cedar-policy-cli

      - name: Validate Schema
        run: |
          cedar validate --schema internal/policy/cedar/schema.json --policies internal/policy/cedar/test_policy.cedar
          
      - name: Check for Vacuous Policies
        # Assuming test_policy.cedar is checked in
        run: |
          cedar check-parse --policies internal/policy/cedar/test_policy.cedar
